spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/scramble
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_HOST}:9092

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

server:
  port: 8080
  address: 0.0.0.0

aws:
  region: ap-south-1
  s3:
    bucket: scramble-storage

gemini:
  api-key: ${GEMINI_API_KEY}